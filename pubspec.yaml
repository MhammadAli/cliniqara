name: cliniqara
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Dependency Injection
  get_it: ^8.0.3

  # Routing
  go_router: ^14.8.1

  # Responsiveness
  flutter_screenutil: ^5.9.3

  # Form Management
  reactive_forms: ^17.0.1

  # Database
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28

  # Utilities
  uuid: ^4.5.1
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  drift_dev: ^2.23.1

flutter:
  uses-material-design: true
